# Имя workflow, отображается во вкладке Actions
name: Tests Calculator

# Триггер: запускать при каждом пуше в ветку master
on:
  push:
    branches: [master]

jobs:
  test:
    # Запускаем на виртуальной машине с Ubuntu
    runs-on: ubuntu-latest
    
    steps:
      # 1. Скачиваем код репозитория в рабочую директорию раннера
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Настраиваем Python  
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      
      - name: Run tests
        run: |
          python -m unittest "04.Git.CI/test_calculator.py" -v
      
      - name: Report result
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ All tests passed!"
          else
            echo "❌ Some tests failed!"
            exit 1
          fi